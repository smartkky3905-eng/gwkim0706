<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라희의 솜사탕 월드 🍭</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-toggle">
                <button id="theme-btn">✨ 테마 바꾸기</button>
            </div>
            <h1>🍬 라희의 방</h1>
        </header>
        
        <main>
            <section class="profile-card">
                <div class="profile-img">
                    <span>👧</span>
                </div>
                <h2>라희를 소개합니다!</h2>
                <ul class="info-list">
                    <li>🏫 오마초등학교</li>
                    <li>🎒 4학년</li>
                    <li>📍 일산 살아요</li>
                </ul>
            </section>

            <section class="hobby-section">
                <h3>가장 좋아하는 것!</h3>
                <div class="hobby-tag">🎨 웹툰 그리기</div>
                <div class="hobby-description">
                    <p>슥슥삭삭~ 웹툰 그릴 때가<br>세상에서 제일 행복해요! ✍️</p>
                    <p>미래의 <strong>멋진 웹툰 작가</strong>가 될 거예요!</p>
                </div>
            </section>
        </main>

        <footer>
            <p>🧁 Made for Rahee by Dad 🧁</p>
        </footer>
    </div>
    <script defer src="/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라희의 솜사탕 월드 🍭</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-toggle">
                <button id="theme-btn">✨ 테마 바꾸기</button>
            </div>
            <h1>🍬 라희의 방</h1>
        </header>
        
        <main>
            <!-- 1. 자기소개 확장 -->
            <section class="profile-card">
                <div class="profile-img">
                    <span>👧</span>
                </div>
                <h2>라희를 소개합니다!</h2>
                <ul class="info-list">
                    <li>🏫 오마초등학교 4학년</li>
                    <li>📍 일산 거주</li>
                    <li>🌈 <strong>꿈:</strong> 멋진 웹툰 작가</li>
                    <li>🍦 <strong>좋아하는 것:</strong> 아이스크림, 마이멜로디</li>
                </ul>
            </section>

            <!-- 2. 웹툰 갤러리 -->
            <section class="gallery-section">
                <h3>🎨 나의 웹툰 갤러리</h3>
                <div class="gallery-grid">
                    <div class="art-card"><span>🖼️</span><p>작품 준비중</p></div>
                    <div class="art-card"><span>🖼️</span><p>작품 준비중</p></div>
                    <div class="art-card"><span>🖼️</span><p>작품 준비중</p></div>
                    <div class="art-card"><span>🖼️</span><p>작품 준비중</p></div>
                </div>
                <p class="gallery-info">라희의 멋진 그림들이 곧 채워질 거예요!</p>
            </section>

            <!-- 3. 방명록 -->
            <section class="guestbook-section">
                <h3>💌 라희에게 한마디</h3>
                <form id="guestbook-form">
                    <input type="text" id="guest-name" placeholder="이름" required>
                    <textarea id="guest-message" placeholder="라희에게 응원 메시지를 남겨주세요!" required></textarea>
                    <button type="submit">메시지 보내기! 🚀</button>
                </form>
                <div id="message-list" class="message-list">
                    <!-- 메시지가 여기에 나타납니다 -->
                </div>
            </section>
        </main>

        <footer>
            <p>🧁 Made for Rahee by Dad 🧁</p>
        </footer>
    </div>
    <script defer src="/main.js"></script>
</body>
</html>
